# 네이버 데이터랩 쇼핑인사이트 카테고리 체계
# https://datalab.naver.com/shoppingInsight/sCategory.naver
# 2026.04.02 실제 API 확인 기준

# 연령 코드: 10, 20, 30, 40, 50, 60
# 성별 코드: f(여성), m(남성), 빈값(전체)

categories:
  패션의류:
    id: "50000000"
    keywords: [패션, 의류, 옷, 코디, 스타일, 브랜드]

  패션잡화:
    id: "50000001"
    keywords: [가방, 신발, 지갑, 모자, 벨트, 액세서리]

  화장품/미용:
    id: "50000002"
    keywords: [뷰티, 화장품, 스킨케어, 메이크업, 향수, 미용]

  디지털/가전:
    id: "50000003"
    keywords: [IT, 전자기기, 가전, 컴퓨터, 스마트폰, 테크, 게이밍]

  가구/인테리어:
    id: "50000004"
    keywords: [가구, 인테리어, 리빙, 홈데코, 수납, 셀프인테리어]

  출산/육아:
    id: "50000005"
    keywords: [육아, 출산, 유아, 아기, 임신, 키즈]

  식품:
    id: "50000006"
    keywords: [식품, 먹거리, 음식, 간식, 건강식, 다이어트식품, 커피, 건강기능식품]

  스포츠/레저:
    id: "50000007"
    keywords: [운동, 헬스, 등산, 캠핑, 골프, 낚시, 스포츠, 요가, 피트니스]

  생활/건강:
    id: "50000008"
    keywords: [건강, 비타민, 영양제, 유산균, 생활용품, 주방, 청소, 세제, 안마]

  여가/생활편의:
    id: "50000009"
    keywords: [여행, 호텔, 티켓, 공연, 전시, 렌탈, 구독]

  면세점:
    id: "50000010"
    keywords: [면세, 명품, 수입]

  도서:
    id: "50005542"
    keywords: [책, 서적, 도서, 경제서적, 자기계발, 소설]

# 채널 관심사 → 데이터랩 카테고리 자동 매핑
auto_mapping:
  건강: [식품, 생활/건강]
  비타민: [식품, 생활/건강]
  영양제: [식품, 생활/건강]
  뷰티: [화장품/미용]
  스킨케어: [화장품/미용]
  패션: [패션의류, 패션잡화]
  IT: [디지털/가전]
  테크: [디지털/가전]
  게임: [디지털/가전]
  육아: [출산/육아]
  요리: [식품]
