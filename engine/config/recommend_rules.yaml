# 추천봇 — 인플루언서 맞춤 추천 규칙
# 채널 시청자 인구통계 기반 상품-채널 궁합 판단에 사용

# ── 인플루언서 등급별 추천 전략 ──────────────────────────────────────────
strategies:
  메가:
    approach: "브랜드 단독 협업 + 프리미엄 패키지"
    pitch_tone: "격식체 (비즈니스 제안서)"
    collab_type: "브랜드 단독 협찬 + 광고비"
    min_margin: 30
    focus_keywords: ["프리미엄", "베스트셀러", "브랜드"]

  매크로:
    approach: "다품목 큐레이션 + 할인 코드 연계"
    pitch_tone: "정중한 (협업 제안)"
    collab_type: "상품 협찬 + 수익 쉐어"
    min_margin: 25
    focus_keywords: ["인기", "추천", "리뷰"]

  마이크로:
    approach: "니치 타겟 상품 + 체험단 제안"
    pitch_tone: "친근한 (파트너 제안)"
    collab_type: "상품 협찬 (무상 제공)"
    min_margin: 20
    focus_keywords: ["가성비", "후기", "솔직"]

  나노:
    approach: "신상품 시딩 + 리뷰 콘텐츠"
    pitch_tone: "캐주얼 (DM 톤)"
    collab_type: "상품 시딩 (무상 제공)"
    min_margin: 15
    focus_keywords: ["신상", "언박싱", "첫인상"]

  기본:
    approach: "범용 추천"
    pitch_tone: "정중한"
    collab_type: "상품 협찬"
    min_margin: 20
    focus_keywords: []

